<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Battle Arena • Шашки & Шахматы | Стрим-версия</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }

        :root {
            --bg-main: #0a0a0c;
            --bg-panel: #141419;
            --border-color: #262630;
            --gemini-cyan: #00f0ff;
            --deepseek-neon: #ff0055;
            --text-main: #f0f0f5;
            --cell-white: #ecd5b0;
            --cell-black: #6b4c3b;
            --glow-cyan: rgba(0, 240, 255, 0.4);
            --glow-neon: rgba(255, 0, 85, 0.4);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-y: auto;
        }

        .header-area {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0 0 12px 0;
            font-size: 28px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--gemini-cyan), var(--deepseek-neon));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(0, 240, 255, 0.3));
        }

        .mode-selector {
            display: flex;
            background-color: #101016;
            padding: 6px;
            border-radius: 60px;
            border: 1px solid var(--border-color);
            gap: 8px;
            justify-content: center;
        }

        .mode-btn {
            background: none;
            border: none;
            color: #aaa;
            padding: 8px 28px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .mode-btn.active {
            background: linear-gradient(145deg, #1f1f2c, #181822);
            color: var(--gemini-cyan);
            box-shadow: 0 0 10px var(--glow-cyan);
            text-shadow: 0 0 3px cyan;
        }

        .control-arena {
            background-color: rgba(20, 20, 25, 0.9);
            backdrop-filter: blur(4px);
            padding: 20px 28px;
            border-radius: 28px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.6);
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .ai-card {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 180px;
        }

        .ai-card label {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .ai-card.gemini label { color: var(--gemini-cyan); text-shadow: 0 0 3px var(--gemini-cyan);}
        .ai-card.deepseek label { color: var(--deepseek-neon); text-shadow: 0 0 2px var(--deepseek-neon);}

        .ai-card input {
            background-color: #0b0b10;
            border: 1.5px solid var(--border-color);
            border-radius: 14px;
            color: #f0f0f5;
            padding: 12px;
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            text-align: center;
            font-family: monospace;
            letter-spacing: 1px;
            transition: 0.2s;
            outline: none;
        }

        .ai-card.gemini input:focus { border-color: var(--gemini-cyan); box-shadow: 0 0 8px var(--glow-cyan);}
        .ai-card.deepseek input:focus { border-color: var(--deepseek-neon); box-shadow: 0 0 8px var(--glow-neon);}

        .action-btn {
            border: none;
            border-radius: 40px;
            font-weight: bold;
            padding: 12px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.1s linear;
            font-family: inherit;
            letter-spacing: 1px;
        }

        .action-btn:active { transform: scale(0.96); }
        
        #btn-gemini { 
            background: linear-gradient(100deg, #0099ff, #00e0ff);
            color: #08080c;
            box-shadow: 0 2px 8px rgba(0, 200, 255, 0.3);
        }
        #btn-deepseek { 
            background: linear-gradient(100deg, #cc0044, #ff3366);
            color: white;
            box-shadow: 0 2px 8px rgba(255, 0, 85, 0.3);
        }

        /* Центр управления отменой и сбросом */
        .center-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            justify-content: center;
            min-width: 200px;
        }

        .control-btn {
            background: #1a1a24;
            border: 1px solid #3c3c50;
            padding: 12px 20px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 1px;
            width: 100%;
            text-align: center;
        }

        .undo-btn {
            color: #00f0ff;
            border-color: rgba(0, 240, 255, 0.4);
        }
        .undo-btn:hover {
            background: var(--gemini-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--glow-cyan);
        }

        .restart-btn {
            color: #ff9900;
            border-color: rgba(255, 153, 0, 0.4);
        }
        .restart-btn:hover {
            background: #ff9900;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 153, 0, 0.4);
        }
        .control-btn:active { transform: scale(0.95); }

        .board-container {
            display: grid;
            grid-template-columns: 40px 560px;
            grid-template-rows: 560px 40px;
            background: #08080c;
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.7);
        }

        .board {
            width: 560px;
            height: 560px;
            background-color: #2c2a2a;
            border: 2px solid #2e2e3a;
            border-radius: 6px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
        }

        .cell {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .w-cell { background-color: var(--cell-white); }
        .b-cell { background-color: var(--cell-black); }

        .axis-y, .axis-x {
            display: flex;
            font-weight: 700;
            color: #9a9ac0;
            font-size: 15px;
            text-shadow: 0 1px 1px black;
        }
        .axis-y {
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            background: #101018;
            border-radius: 12px 0 0 12px;
        }
        .axis-x {
            grid-column: 2;
            justify-content: space-around;
            align-items: center;
            background: #101018;
            border-radius: 0 0 12px 12px;
        }

        /* Фигуры */
        .piece {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 5;
            user-select: none;
        }

        .piece.checker-white {
            background: radial-gradient(circle at 35% 35%, #fefefe, #c0c0ca);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            border: 2px solid #e0e0e0;
            box-shadow: 0 5px 8px rgba(0,0,0,0.3), inset 0 -2px 3px rgba(0,0,0,0.2);
        }
        .piece.checker-black {
            background: radial-gradient(circle at 35% 35%, #3b3b44, #1a1a22);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            border: 1px solid #5a5a6e;
            box-shadow: 0 5px 8px rgba(0,0,0,0.5), inset 0 -1px 2px rgba(255,255,255,0.1);
        }

        .piece.chess-piece {
            font-size: 50px;
            line-height: 1;
            text-align: center;
            width: 60px;
            height: 60px;
        }
        .piece.ch-white {
            color: #ffffff;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.6)) drop-shadow(0 0 1px #000);
        }
        .piece.ch-black {
            color: #1a1a1a;
            filter: drop-shadow(0 2px 2px rgba(255,255,255,0.4)) drop-shadow(0 0 1px #fff);
        }

        /* Эффекты подсветки */
        .source-flash { animation: pulse-cyan 0.8s infinite; z-index: 2; }
        .target-flash { animation: pulse-neon 0.8s infinite; z-index: 2; }

        @keyframes pulse-cyan {
            0% { box-shadow: inset 0 0 20px var(--gemini-cyan); }
            50% { box-shadow: none; }
            100% { box-shadow: inset 0 0 20px var(--gemini-cyan); }
        }
        @keyframes pulse-neon {
            0% { box-shadow: inset 0 0 20px var(--deepseek-neon); }
            50% { box-shadow: none; }
            100% { box-shadow: inset 0 0 20px var(--deepseek-neon); }
        }

        .info-tip {
            font-size: 13px;
            color: #6e6e8a;
            margin-top: 15px;
            text-align: center;
            background: #0f0f14;
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

<div class="header-area">
    <h1>⚡ AI BATTLE ARENA ⚡</h1>
    <div class="mode-selector">
        <button class="mode-btn active" id="mode-checkers" onclick="switchMode('checkers')">ШАШКИ</button>
        <button class="mode-btn" id="mode-chess" onclick="switchMode('chess')">ШАХМАТЫ</button>
    </div>
</div>

<div class="control-arena">
    <div class="ai-card gemini">
        <label>🧠 GEMINI (БЕЛЫЕ)</label>
        <input type="text" id="input-gemini" placeholder="Напр. E2-E4" autocomplete="off">
        <button class="action-btn" id="btn-gemini" onclick="applyMove('gemini')">🔥 Выполнить ход</button>
    </div>

    <!-- Панель управления по центру -->
    <div class="center-controls">
        <button class="control-btn undo-btn" onclick="undoLastMove()">↩️ ОТМЕНИТЬ ХОД</button>
        <button class="control-btn restart-btn" onclick="resetGame()">🔄 RESTART</button>
    </div>

    <div class="ai-card deepseek">
        <label>⚡ DEEPSEEK (ЧЁРНЫЕ)</label>
        <input type="text" id="input-deepseek" placeholder="Напр. E7-E5" autocomplete="off">
        <button class="action-btn" id="btn-deepseek" onclick="applyMove('deepseek')">⚫ Выполнить ход</button>
    </div>
</div>

<div class="board-container">
    <div class="axis-y">
        <div>8</div><div>7</div><div>6</div><div>5</div><div>4</div><div>3</div><div>2</div><div>1</div>
    </div>
    <div class="board" id="boardGrid"></div>
    <div class="axis-x">
        <div>A</div><div>B</div><div>C</div><div>D</div><div>E</div><div>F</div><div>G</div><div>H</div>
    </div>
</div>
<div class="info-tip">
    🛠️ Накосячил с ходом? Нажми «ОТМЕНИТЬ ХОД» — фигура и вся срубленная дичь мгновенно вернутся назад!
</div>

<script>
    const files = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
    let currentMode = 'checkers';   
    const cells = {};               
    const boardDiv = document.getElementById('boardGrid');
    
    // Стек для истории ходов (для отмены)
    let moveHistory = [];

    const chessSymbols = {
        white: { 'R': '♜', 'N': '♞', 'B': '♝', 'Q': '♛', 'K': '♚', 'P': '♟' },
        black: { 'R': '♜', 'N': '♞', 'B': '♝', 'Q': '♛', 'K': '♚', 'P': '♟' }
    };

    // Генерируем доску
    for (let row = 8; row >= 1; row--) {
        for (let col = 0; col < 8; col++) {
            const cellDiv = document.createElement('div');
            const cellId = `${files[col]}${row}`;
            cellDiv.className = `cell ${(row + col) % 2 === 0 ? 'w-cell' : 'b-cell'}`;
            cellDiv.id = cellId;
            boardDiv.appendChild(cellDiv);
            cells[cellId] = cellDiv;
        }
    }

    function createPiece(cellId, classes, symbol = '') {
        const p = document.createElement('div');
        p.className = classes;
        if (symbol) p.innerText = symbol;
        cells[cellId].appendChild(p);
        return p;
    }

    function initPieces(mode) {
        document.querySelectorAll('.piece').forEach(p => p.remove());
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('source-flash', 'target-flash'));
        moveHistory = []; // Очищаем историю при перезапуске

        if (mode === 'checkers') {
            for (let row = 8; row >= 1; row--) {
                for (let col = 0; col < 8; col++) {
                    if ((row + col) % 2 !== 0) {
                        const cellId = `${files[col]}${row}`;
                        if (row >= 6) createPiece(cellId, 'piece checker-black');
                        if (row <= 3) createPiece(cellId, 'piece checker-white');
                    }
                }
            }
        } else if (mode === 'chess') {
            const backRow = ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R'];
            for (let col = 0; col < 8; col++) {
                createPiece(`${files[col]}8`, 'piece chess-piece ch-black', chessSymbols.black[backRow[col]]);
                createPiece(`${files[col]}7`, 'piece chess-piece ch-black', chessSymbols.black['P']);
                createPiece(`${files[col]}2`, 'piece chess-piece ch-white', chessSymbols.white['P']);
                createPiece(`${files[col]}1`, 'piece chess-piece ch-white', chessSymbols.white[backRow[col]]);
            }
        }
    }

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('mode-checkers').classList.toggle('active', mode === 'checkers');
        document.getElementById('mode-chess').classList.toggle('active', mode === 'chess');
        initPieces(mode);
    }

    function resetGame() {
        initPieces(currentMode);
        document.getElementById('input-gemini').value = '';
        document.getElementById('input-deepseek').value = '';
    }

    // Сохранение состояния доски перед ходом
    function saveState() {
        const state = [];
        for (const cellId in cells) {
            const piece = cells[cellId].querySelector('.piece');
            if (piece) {
                state.push({
                    cellId: cellId,
                    className: piece.className,
                    text: piece.innerText
                });
            }
        }
        moveHistory.push(state);
    }

    // Мгновенный откат назад
    function undoLastMove() {
        if (moveHistory.length === 0) {
            alert("↩️ Больше отменять нечего, доска в исходном состоянии!");
            return;
        }

        // Удаляем текущие фигуры и подсветку
        document.querySelectorAll('.piece').forEach(p => p.remove());
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('source-flash', 'target-flash'));

        // Достаем из истории прошлое состояние доски
        const previousState = moveHistory.pop();
        previousState.forEach(pData => {
            createPiece(pData.cellId, pData.className, pData.text);
        });
    }

    function applyMove(aiName) {
        const input = document.getElementById(`input-${aiName}`);
        const moveStr = input.value.toUpperCase().trim();
        if (!moveStr) return;

        const tokens = moveStr.split(/[- ]+/);
        if (tokens.length < 2) {
            alert("❌ Формат: СТАРТ-ФИНИШ (например A2-A4)");
            return;
        }

        const startId = tokens[0];
        const startCell = cells[startId];
        const activePiece = startCell ? startCell.querySelector('.piece') : null;

        if (!activePiece) {
            alert(`❌ На клетке ${startId} нет фигуры!`);
            return;
        }

        // Перед тем как двинуть фигуру, сохраняем доску в историю отмены!
        saveState();

        document.querySelectorAll('.cell').forEach(c => c.classList.remove('source-flash', 'target-flash'));
        let currentId = startId;

        for (let i = 1; i < tokens.length; i++) {
            let nextId = tokens[i];
            let nextCell = cells[nextId];

            if (!nextCell) return;

            // Рубим шашки
            if (currentMode === 'checkers') {
                const f1 = files.indexOf(currentId[0]), r1 = parseInt(currentId[1]);
                const f2 = files.indexOf(nextId[0]), r2 = parseInt(nextId[1]);
                if (Math.abs(r1 - r2) === 2) {
                    const midCell = cells[`${files[(f1 + f2) / 2]}${(r1 + r2) / 2}`];
                    const victim = midCell ? midCell.querySelector('.piece') : null;
                    if (victim) victim.remove();
                }
            } 
            // Едим шахматы
            else if (currentMode === 'chess') {
                const enemy = nextCell.querySelector('.piece');
                if (enemy) enemy.remove();
            }

            nextCell.appendChild(activePiece);
            currentId = nextId;
        }

        cells[startId].classList.add('source-flash');
        cells[tokens[tokens.length - 1]].classList.add('target-flash');
        input.value = '';
    }

    // Запуск первой доски
    initPieces('checkers');
</script>
</body>
</html>
