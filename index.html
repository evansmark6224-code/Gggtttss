<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPE MOMENT PRO | LIVE</title>
    <style>
        :root { 
            --red: #ff0000; 
            --gold: #ffd700; 
            --bg: #050505; 
        }
        
        body, html { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0;
        }

        /* ШАПКА */
        header { 
            background: linear-gradient(180deg, var(--red) 0%, #330000 100%); 
            padding: 15px 10px;
            text-align: center;
            font-size: 24px; 
            font-weight: 900; 
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 2px solid #550000;
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР */
        .main-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ВИДЕО ПЛЕЕР */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #222;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* КНОПКИ УПРАВЛЕНИЯ - ИДЕАЛЬНАЯ СЕТКА 2x2 */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            margin-top: 20px;
        }

        .btn {
            padding: 15px 10px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 900;
            text-align: center;
            color: #fff;
            text-transform: uppercase;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:active { transform: scale(0.95); }

        .btn-donate { background: linear-gradient(90deg, #ffd700, #ff8c00); color: #000; }
        .btn-tg { background: #0088cc; }
        .btn-inst { background: linear-gradient(45deg, #f09433, #bc1888); }
        .btn-yt { background: var(--red); }

        /* ВСПЛЫВАЮЩИЙ БАННЕР */
        #reminder {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 215, 0, 0.95);
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 900;
            z-index: 1000;
            display: none;
            box-shadow: 0 0 20px var(--gold);
            text-align: center;
            white-space: nowrap;
            animation: slideUp 0.5s;
        }

        @keyframes slideUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

    </style>
</head>
<body>

    <header>HYPE MOMENT PRO</header>

    <div class="main-container">
        
        <div class="video-wrapper">
            <div id="reminder">🔥 В ЭФИРЕ: ПОДПИШИСЬ! 🔥</div>
            
            <iframe src="https://player.kick.com/hypemoment-pro?origin=csajaj-max.github.io" frameborder="0" scrolling="no" allowfullscreen="true"></iframe>
        </div>

        <div class="button-grid">
            <a href="https://www.donationalerts.com/r/tim04745774" class="btn btn-donate" target="_blank">💰 ДОНАТ</a>
            <a href="https://t.me/hypemoment_pro" class="btn btn-tg" target="_blank">✈️ TG</a>
            <a href="https://www.instagram.com/hypemoment_pro" class="btn btn-inst" target="_blank">📸 INST</a>
            <a href="https://www.youtube.com/@HYPEMOMENTPRO" class="btn btn-yt" target="_blank">🎬 YT</a>
        </div>

    </div>

    <script>
        // Система автоматических напоминаний
        function showReminder() {
            const reminder = document.getElementById('reminder');
            reminder.style.display = 'block';
            setTimeout(() => {
                reminder.style.display = 'none';
            }, 20000); // Висит 20 секунд
        }

        // Запуск через 1 минуту после старта, затем каждые 15 минут
        setTimeout(() => {
            showReminder();
            setInterval(showReminder, 900000); 
        }, 60000);
    </script>

</body>
</html>
